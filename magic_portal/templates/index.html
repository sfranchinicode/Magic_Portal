<!DOCTYPE html>
<html>
<head>
    <title>{{ portal|capitalize }} Portal</title>
    <style>
        body { margin:0; background:#111; display:flex; flex-direction:column;  justify-content:center; align-items:center; height:100vh; }
        img { max-width:90%; max-height:90vh; border: 5px solid #fff; border-radius: 10px; object-fit:contain;}
    </style>
</head>
<body>
    <div style="text-align:center;">
        <img id="slideshow" src="" />
        <div id="artName" style="text-align:center; margin-top:10px; font-weight:bold; color: #fff; font-size:1.2em;"></div>
    </div>
    <script>
        const images = {{ images|tojson }};
        let index = 0;
        const imgElement = document.getElementById('slideshow'); 

        function showNext() {
            if(images.length === 0) return;
            imgElement.src = "/static/{{ portal }}/" + images[index];
            document.getElementById("artName").textContent = images[index].split('.').slice(0, -1).join('.');
            index = (index + 1) % images.length;
        }

        showNext();
        setInterval(showNext, 45000); 
    </script>
</body>
</html>
